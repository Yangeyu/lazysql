name: release

# Publish to npm on a version tag. OpenTUI ships per-platform native modules, so
# each binary is compiled natively on its own OS runner (no cross-compile), then a
# single job collects them and publishes the platform sub-packages plus the slim
# main package. Auth is OIDC trusted publishing — no long-lived token: every
# published package (main + each platform sub-package) must list this repo +
# workflow as its trusted publisher on npmjs.com.
on:
  push:
    tags: ['v*']

jobs:
  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { suffix: darwin-arm64, runner: macos-14 }
          - { suffix: linux-x64, runner: ubuntu-latest }
          - { suffix: linux-arm64, runner: ubuntu-24.04-arm }
          - { suffix: win32-x64, runner: windows-latest }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun scripts/build-npm.ts --target=${{ matrix.suffix }}
      # Boot the freshly-built binary on its own platform: `--list` fully starts
      # the runtime (loading every static dependency) then exits 0, so a binary
      # that crashes on launch fails the job and never reaches publish.
      - name: Smoke test — binary must boot
        shell: bash
        run: |
          bin="dist/npm/${{ matrix.suffix }}/bin/lazysql"
          [ "${{ matrix.suffix }}" = "win32-x64" ] && bin="${bin}.exe"
          chmod +x "$bin" 2>/dev/null || true
          "$bin" --list
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: dist/npm/${{ matrix.suffix }}

  publish:
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint the OIDC token npm exchanges for a publish credential
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # Each artifact lands as dist/npm/<suffix>/ (the artifact name is the suffix).
      - uses: actions/download-artifact@v4
        with:
          path: dist/npm
      - run: bun scripts/build-npm.ts --main-only
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      # Trusted publishing needs npm >= 11.5.1; the npm bundled with node 22 is older.
      - run: npm install -g npm@latest
      # No NODE_AUTH_TOKEN: npm detects the GitHub OIDC environment and mints a
      # short-lived per-package credential (provenance attached automatically).
      # Restore the executable bit (artifact round-trips drop it) so npm ships a
      # runnable binary, then publish every sub-package before the main package.
      - name: Publish
        run: |
          chmod +x dist/npm/*/bin/lazysql 2>/dev/null || true
          for dir in dist/npm/*/; do
            [ "$(basename "$dir")" = "main" ] && continue
            npm publish "$dir"
          done
          npm publish dist/npm/main
