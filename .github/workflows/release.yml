name: release

# Publish to npm on a version tag. OpenTUI ships per-platform native modules, so
# each binary is compiled natively on its own OS runner (no cross-compile), then a
# single job collects them and publishes the platform sub-packages plus the slim
# main package. Auth is OIDC trusted publishing — no long-lived token: every
# published package (main + each platform sub-package) must list this repo +
# workflow as its trusted publisher on npmjs.com.
on:
  push:
    tags: ['v*']

jobs:
  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { suffix: darwin-arm64, runner: macos-14 }
          - { suffix: linux-x64, runner: ubuntu-latest }
          - { suffix: linux-arm64, runner: ubuntu-24.04-arm }
          - { suffix: win32-x64, runner: windows-latest }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun scripts/build-npm.ts --target=${{ matrix.suffix }}
      # Boot the freshly-built binary on its own platform: the meta-commands start
      # the runtime (every static import is evaluated) then exit 0, so a binary that
      # crashes on launch fails the job and never reaches publish. --version also
      # confirms the package.json version was inlined into the compiled binary;
      # --list additionally exercises the persistence adapters + config I/O.
      - name: Smoke test — binary must boot
        shell: bash
        run: |
          bin="dist/npm/${{ matrix.suffix }}/bin/lazysql"
          [ "${{ matrix.suffix }}" = "win32-x64" ] && bin="${bin}.exe"
          chmod +x "$bin" 2>/dev/null || true
          "$bin" --version
          "$bin" --list
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.suffix }}
          path: dist/npm/${{ matrix.suffix }}

  publish:
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint the OIDC token npm exchanges for a publish credential
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # Each artifact lands as dist/npm/<suffix>/ (the artifact name is the suffix).
      - uses: actions/download-artifact@v8
        with:
          path: dist/npm
      - run: bun scripts/build-npm.ts --main-only
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      # Trusted publishing needs npm >= 11.5.1; the npm bundled with node 22 is older.
      - run: npm install -g npm@latest
      # No NODE_AUTH_TOKEN: npm detects the GitHub OIDC environment and mints a
      # short-lived per-package credential (provenance attached automatically).
      # Restore the executable bit (artifact round-trips drop it) so npm ships a
      # runnable binary. Idempotent: skip any package@version already on the
      # registry, so re-running a tag after a partial failure publishes only
      # what's missing instead of aborting on the first conflict. Sub-packages
      # first, then the main package (which depends on them).
      - name: Publish
        run: |
          chmod +x dist/npm/*/bin/lazysql 2>/dev/null || true
          publish_if_new() {
            local dir="$1" name ver
            name=$(node -p "require('$GITHUB_WORKSPACE/$dir/package.json').name")
            ver=$(node -p "require('$GITHUB_WORKSPACE/$dir/package.json').version")
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "skip $name@$ver — already published"
            else
              npm publish "$dir"
            fi
          }
          for dir in dist/npm/*/; do
            [ "$(basename "$dir")" = "main" ] && continue
            publish_if_new "$dir"
          done
          publish_if_new dist/npm/main

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # git-cliff needs full history + tags to scope the notes to this release
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # Idempotent like the publish job: a re-run of the tag skips an existing release.
      - name: Create GitHub Release with git-cliff notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "skip $GITHUB_REF_NAME — release already exists"
            exit 0
          fi
          bunx git-cliff --current --strip header -o notes.md
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file notes.md
