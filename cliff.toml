# git-cliff configuration — generates CHANGELOG.md from Conventional Commits.
# Type→section mapping mirrors docs/commit-convention.md (chore/style/test/ci
# are intentionally excluded there). Regenerate: bun run changelog.

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.
Generated from [Conventional Commits](https://www.conventionalcommits.org/) by [git-cliff](https://git-cliff.org/).

"""
body = """
{%- macro remote_url() -%}
https://github.com/Yangeyu/lazysql
{%- endmacro %}
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}]({{ self::remote_url() }}/releases/tag/{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{% if commit.breaking %}[**breaking**] {% endif %}\
{{ commit.message | upper_first }} \
([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
protect_breaking_commits = true
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactoring" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^build", group = "<!-- 5 -->Build" },
  { message = "^revert", group = "<!-- 6 -->Reverts" },
  { message = "^(chore|style|test|ci)", skip = true },
]
